<!DOCTYPE html>
<html>
<head>
<title>CSS Tasks</title>

<style>

body{
    text-align: center;
    font-family: Arial, sans-serif;
}

/* Yellow rectangle */
.yellow-box{
    background-color: yellow;
    width: 400px;
    height: 80px;
    margin: 20px auto;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
}

/* Container for 3 boxes */
.container{
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
}

/* Skyblue square boxes */
.box{
    background-color: skyblue;
    width: 150px;
    height: 150px;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    font-weight: bold;
}

</style>
</head>

<body>

<h1>Task 1</h1>

<div class="yellow-box">
Welcome to the browser
</div>

<h1>Task 2</h1>

<div class="container">

<div class="box">
Status Card: Processing....
</div>

<div class="box">
Status Card 2: Active
</div>

<div class="box">
Status Card 3: Complete
</div>

</div>

</body>
</html>
